<html>
    <head>
        <title>vue-timeline-component demo</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="https://unpkg.com/vue-timeline-component@0.2.6/dist/vue-timeline-component.umd.js"></script>
        <style>
            body {
                font-family: 'Avenir', Helvetica, Arial, sans-serif;
                text-align: center;
                background-color: #f9f9f9;
            }
        </style>
    </head>
    <body>
        <h3>vue-timeline-component demo</h3>
        <div id="app">
            <vue-timeline :data="events" :config="config"></vue-timeline>
        </div>

        <script>
          const { createApp } = Vue
          const { VueTimeline, TimelineSpan, TimelinePoint } = VueTimelineComponent

          createApp({
            components: { VueTimeline },
            data() {
                return {
                    events: [
                        new TimelineSpan("event 1", new Date(2025, 0, 1), new Date(2025, 0, 10)),
                        new TimelineSpan("event 2", new Date(2025, 0, 5), new Date(2025, 1, 15)),
                        new TimelineSpan("event 3", new Date(2025, 1, 1), new Date(2025, 3, 20)),
                        new TimelineSpan("event 4", new Date(2025, 3, 1), new Date(2025, 5, 30)),
                        new TimelinePoint(new Date(2025, 2, 15), "Milestone"),
                    ],
                    config: {
                        onClick(item) {
                            alert('Clicked: ' + (item.name || item.description))
                        }
                    }
                }
            }
          }).mount('#app')
        </script>
    </body>
</html>
