<html>
    <head>
        <title>vue-timeline-component demo</title>
        <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
        <script src="https://unpkg.com/vue-timeline-component@0.2.0/dist/vue-timeline-component.umd.js"></script>
        <style>
            body {
                font-family: 'Avenir', Helvetica, Arial, sans-serif;
                text-align: center;
                background-color: #f9f9f9;
            }
        </style>
    </head>
    <body>
        <h3>vue-timeline-component demo</h3>
        <div id="app">
            <vue-timeline :data="events" :config="config"></vue-timeline>
        </div>

        <script>
          const { createApp } = Vue
          const { VueTimeline } = VueTimelineComponent

          createApp({
            components: { VueTimeline },
            data() {
                return {
                    events: [{
                        name: "event 1",
                        start: new Date(2025, 0, 1),
                        end: new Date(2025, 0, 10),
                    },{
                        name: "event 2",
                        start: new Date(2025, 0, 5),
                        end: new Date(2025, 1, 15),
                    },{
                        name: "event 3",
                        start: new Date(2025, 1, 1),
                        end: new Date(2025, 3, 20),
                    },{
                        name: "event 4",
                        start: new Date(2025, 3, 1),
                        end: new Date(2025, 5, 30),
                    }],
                    config: {
                        onEventClick(event) {
                            alert('Clicked: ' + event.name)
                        }
                    }
                }
            }
          }).mount('#app')
        </script>
    </body>
</html>
